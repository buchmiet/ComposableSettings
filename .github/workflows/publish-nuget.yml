name: Publish NuGet

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      PACKAGE_VERSION: 1.0.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Show package version
        run: |
          echo "Package version: $PACKAGE_VERSION"

      - name: Pack
        run: |
          dotnet pack src/ComposableSettings/ComposableSettings.csproj --configuration Release --no-build --output ./artifacts /p:PackageVersion=$PACKAGE_VERSION

      - name: Push to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
